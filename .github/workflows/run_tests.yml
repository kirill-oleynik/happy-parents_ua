name: Tests

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Ruby
      uses: ruby/setup-ruby@359bebbc29cbe6c87da6bc9ea3bc930432750108
      with:
        ruby-version: '3.1'
    - name: Install dependencies
      run: bundle install
    - name: setup Database
      run: bundle exec rails:db:create db:migrate
    - name: Run tests
      run: bundle exec rspec
